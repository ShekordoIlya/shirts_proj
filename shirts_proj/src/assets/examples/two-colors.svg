<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1226"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="30%" r="75%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.24"/>
      <stop offset="0.45" stop-color="#60a5fa" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <rect x="90" y="90" width="1020" height="720" rx="44" fill="#0b1226" fill-opacity="0.42" stroke="#22c55e" stroke-opacity="0.18"/>

  <g filter="url(#shadow)">
    <path d="M410 250
             C420 220 450 200 480 190
             L520 170
             C545 210 570 225 600 225
             C630 225 655 210 680 170
             L720 190
             C750 200 780 220 790 250
             L845 360
             L770 400
             L740 330
             L740 740
             C740 770 715 795 685 795
             L515 795
             C485 795 460 770 460 740
             L460 330
             L430 400
             L355 360 Z"
          fill="url(#shirt)" stroke="#0f172a" stroke-opacity="0.15" stroke-width="3"/>

    <!-- Two-color mark -->
    <g transform="translate(520 410)">
      <rect x="0" y="0" width="160" height="86" rx="22" fill="#0f172a" fill-opacity="0.92" stroke="#60a5fa" stroke-opacity="0.55" stroke-width="4"/>
      <path d="M34 55 C50 30 80 22 104 34 C129 46 135 76 116 92 C95 110 60 100 48 80"
            fill="none" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
      <circle cx="120" cy="36" r="10" fill="#60a5fa" opacity="0.9"/>
      <circle cx="134" cy="52" r="8" fill="#22c55e" opacity="0.9"/>
    </g>

    <!-- Neck label -->
    <g transform="translate(572 280)">
      <rect x="0" y="0" width="56" height="26" rx="10" fill="#0f172a" fill-opacity="0.85" stroke="#22c55e" stroke-opacity="0.45"/>
      <text x="28" y="18" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#e5e7eb">TAG</text>
    </g>
  </g>

  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif" fill="#e5e7eb">
    <text x="150" y="175" font-size="34" font-weight="700">Двухцветный логотип</text>
    <text x="150" y="218" font-size="20" fill="#9ca3af">Грудь + бирка • Шелкография</text>
  </g>
</svg>