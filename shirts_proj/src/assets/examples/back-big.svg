<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1226"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="60%" cy="35%" r="75%">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <rect x="90" y="90" width="1020" height="720" rx="44" fill="#0b1226" fill-opacity="0.45" stroke="#60a5fa" stroke-opacity="0.18"/>

  <!-- T-shirt (back view) -->
  <g filter="url(#shadow)">
    <path d="M410 250
             C420 220 450 200 480 190
             L520 170
             C545 200 570 215 600 215
             C630 215 655 200 680 170
             L720 190
             C750 200 780 220 790 250
             L845 360
             L770 400
             L740 330
             L740 745
             C740 770 720 790 695 790
             L505 790
             C480 790 460 770 460 745
             L460 330
             L430 400
             L355 360 Z"
          fill="url(#shirt)" stroke="#0f172a" stroke-opacity="0.15" stroke-width="3"/>

    <!-- Big back logo -->
    <g transform="translate(450 390)">
      <rect x="0" y="0" width="300" height="300" rx="36" fill="#0f172a" fill-opacity="0.92" stroke="#22c55e" stroke-opacity="0.55" stroke-width="4"/>
      <path d="M75 165 C115 90 185 85 225 120 C262 152 255 220 215 248 C175 275 115 260 95 215"
            fill="none" stroke="#4ade80" stroke-width="10" stroke-linecap="round"/>
      <path d="M120 210 L150 240 L240 150" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="150" y="285" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#e5e7eb">LOGO</text>
    </g>
  </g>

  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif" fill="#e5e7eb">
    <text x="150" y="175" font-size="34" font-weight="700">Логотип на спине</text>
    <text x="150" y="218" font-size="20" fill="#9ca3af">Спина (центр) • Шелкография</text>
  </g>
</svg>