<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1226"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="45%" cy="35%" r="75%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="0.35" stop-color="#fbbf24" stop-opacity="0.12"/>
      <stop offset="0.65" stop-color="#60a5fa" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="shirtA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="shirtB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1226"/>
      <stop offset="1" stop-color="#040815"/>
    </linearGradient>
    <linearGradient id="shirtC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3e7d3"/>
      <stop offset="1" stop-color="#e7d4b5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <rect x="90" y="90" width="1020" height="720" rx="44" fill="#0b1226" fill-opacity="0.42" stroke="#22c55e" stroke-opacity="0.18"/>

  <!-- Three shirts -->
  <g filter="url(#shadow)" stroke-opacity="0.18" stroke-width="3">
    <g transform="translate(260 260) scale(0.75)">
      <path d="M410 250 C420 220 450 200 480 190 L520 170
               C545 210 570 225 600 225 C630 225 655 210 680 170
               L720 190 C750 200 780 220 790 250 L845 360 L770 400
               L740 330 L740 740 C740 770 715 795 685 795 L515 795
               C485 795 460 770 460 740 L460 330 L430 400 L355 360 Z"
            fill="url(#shirtA)" stroke="#0f172a"/>
      <rect x="555" y="420" width="90" height="48" rx="14" fill="#0f172a" fill-opacity="0.88" stroke="#22c55e" stroke-opacity="0.55"/>
      <text x="600" y="452" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#e5e7eb">STAFF</text>
    </g>

    <g transform="translate(520 235) scale(0.82)">
      <path d="M410 250 C420 220 450 200 480 190 L520 170
               C545 210 570 225 600 225 C630 225 655 210 680 170
               L720 190 C750 200 780 220 790 250 L845 360 L770 400
               L740 330 L740 740 C740 770 715 795 685 795 L515 795
               C485 795 460 770 460 740 L460 330 L430 400 L355 360 Z"
            fill="url(#shirtB)" stroke="#94a3b8"/>
      <circle cx="600" cy="455" r="46" fill="#22c55e" opacity="0.92"/>
      <path d="M578 455 L595 472 L624 436" fill="none" stroke="#022c22" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(760 280) scale(0.70)">
      <path d="M410 250 C420 220 450 200 480 190 L520 170
               C545 210 570 225 600 225 C630 225 655 210 680 170
               L720 190 C750 200 780 220 790 250 L845 360 L770 400
               L740 330 L740 740 C740 770 715 795 685 795 L515 795
               C485 795 460 770 460 740 L460 330 L430 400 L355 360 Z"
            fill="url(#shirtC)" stroke="#0f172a"/>
      <text x="600" y="490" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="56" font-weight="900" fill="#0f172a" opacity="0.9">EVENT</text>
      <path d="M500 520 H700" stroke="#22c55e" stroke-width="10" stroke-linecap="round" opacity="0.65"/>
    </g>
  </g>

  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif" fill="#e5e7eb">
    <text x="150" y="175" font-size="34" font-weight="700">Пакет для события</text>
    <text x="150" y="218" font-size="20" fill="#9ca3af">Разные цвета • Грудь + спина</text>
  </g>
</svg>