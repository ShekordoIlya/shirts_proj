<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1226"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="30%" r="70%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.16"/>
      <stop offset="0.45" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3e7d3"/>
      <stop offset="1" stop-color="#e7d4b5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <rect x="90" y="90" width="1020" height="720" rx="44" fill="#0b1226" fill-opacity="0.42" stroke="#fbbf24" stroke-opacity="0.18"/>

  <g filter="url(#shadow)">
    <path d="M410 250
             C420 220 450 200 480 190
             L520 170
             C545 210 570 225 600 225
             C630 225 655 210 680 170
             L720 190
             C750 200 780 220 790 250
             L845 360
             L770 400
             L740 330
             L740 740
             C740 770 715 795 685 795
             L515 795
             C485 795 460 770 460 740
             L460 330
             L430 400
             L355 360 Z"
          fill="url(#shirt)" stroke="#0f172a" stroke-opacity="0.15" stroke-width="3"/>

    <!-- Typography -->
    <g font-family="system-ui, -apple-system, Segoe UI, sans-serif" text-anchor="middle">
      <text x="600" y="470" font-size="54" font-weight="800" fill="#0f172a">BRAND</text>
      <text x="600" y="520" font-size="22" font-weight="650" fill="#0f172a" opacity="0.85">EST. 2026 • QUALITY PRINT</text>
      <path d="M480 540 H720" stroke="#22c55e" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
    </g>
  </g>

  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif" fill="#e5e7eb">
    <text x="150" y="175" font-size="34" font-weight="700">Типографика спереди</text>
    <text x="150" y="218" font-size="20" fill="#9ca3af">Грудь (центр) • DTF-печать</text>
  </g>
</svg>