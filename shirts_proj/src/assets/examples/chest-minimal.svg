<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1226"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="30%" r="65%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#60a5fa" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#050b1b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>

  <!-- Card -->
  <rect x="90" y="90" width="1020" height="720" rx="44" fill="#0b1226" fill-opacity="0.55" stroke="#22c55e" stroke-opacity="0.22"/>

  <!-- T-shirt mock -->
  <g filter="url(#shadow)">
    <path d="M410 250
             C420 220 450 200 480 190
             L520 170
             C545 210 570 225 600 225
             C630 225 655 210 680 170
             L720 190
             C750 200 780 220 790 250
             L845 360
             L770 400
             L740 330
             L740 740
             C740 770 715 795 685 795
             L515 795
             C485 795 460 770 460 740
             L460 330
             L430 400
             L355 360 Z"
          fill="url(#shirt)" stroke="#94a3b8" stroke-opacity="0.25" stroke-width="3"/>

    <!-- Collar -->
    <path d="M520 170 C545 210 570 225 600 225 C630 225 655 210 680 170"
          fill="none" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="10" stroke-linecap="round"/>

    <!-- Minimal chest logo -->
    <g transform="translate(535 410)">
      <rect x="0" y="0" width="64" height="64" rx="16" fill="#0f172a" stroke="#22c55e" stroke-opacity="0.75" stroke-width="3"/>
      <path d="M18 34 L30 46 L48 22" fill="none" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Caption -->
  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif" fill="#e5e7eb">
    <text x="150" y="175" font-size="34" font-weight="700">Минимал на груди</text>
    <text x="150" y="218" font-size="20" fill="#9ca3af">Левая грудь • DTF-печать</text>
  </g>
</svg>